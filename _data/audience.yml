signpost:
  heading: "Find the information that matters to you"
  cards:
    - id: "schools"
      title: "For schools"
      body: "Bring curriculum-linked neuroscience, data literacy and ethics into school while helping build evidence that reflects the lives of young people in Bradford. Our team works around school timetables, brings the equipment, and provides clear information for staff, parents and pupils."
      cta_label: "Information for schools"
      cta_href: "#schools"
    - id: "parents"
      title: "For parents and carers"
      body: "Your child's participation is voluntary. We explain everything clearly before consent is requested, including what data may be involved, how it will be protected, and how your child can choose which parts they do or do not want to take part in."
      cta_label: "Information for parents"
      cta_href: "#parents"
    - id: "young-people"
      title: "For young people"
      body: "You will learn about digital data, brain science and research. You can decide whether to take part, which parts you are comfortable with, and whether you want to donate any of your data. You can change your mind."
      cta_label: "Information for young people"
      cta_href: "#young-people"

for_schools:
  heading: "Information for schools"
  subheading: "A research partnership that brings digital literacy and brain science into the classroom."
  body: |
    MyPhone/MyBrain is designed to work with schools, not simply in schools. Participating schools help shape practical arrangements, communication with families, safeguarding routes and the way findings are shared. The research team brings the equipment and delivers the sessions. We work around timetables, exam periods and the needs of pupils and staff.
  benefits:
    - heading: "Curriculum-linked learning"
      body: "The MyBrain part of the session introduces pupils to neuroscience, measurement, data quality and research methods through hands-on activities."
    - heading: "Digital literacy and data awareness"
      body: "The MyPhone part helps pupils think critically about the data generated by digital platforms, what those data can and cannot show, and how research can use data responsibly."
    - heading: "Inclusive science"
      body: "The project has been co-designed with young people, parents and teachers. The MyBrain protocol has been tested for school use and adapted to support pupils with different hair types, religious head coverings and comfort needs."
    - heading: "Contribution to better evidence"
      body: "Schools help build a large, diverse evidence base on a topic that matters to pupils, families and society."
  gatsby_benchmarks:
    intro: "Participation in MyPhone/MyBrain can help schools evidence three Gatsby Benchmarks as part of their careers programme."
    benchmarks:
      - number: "4"
        label: "Linking curriculum learning to careers"
        body: "Curriculum-linked science, psychology, computing and data activities directly connect classroom subjects to research careers and STEM pathways."
      - number: "5"
        label: "Encounters with employers and employees"
        body: "Pupils have meaningful encounters with university researchers, research software engineers and data specialists during the session."
      - number: "7"
        label: "Encounters with further and higher education"
        body: "Direct engagement with a university-led research programme gives pupils experience of how higher education research works in practice."
    compass_note: "Schools can record participation within their careers programme using their usual Compass or Compass+ processes."

  what_schools_need: |
    To participate, schools need to provide a named contact, a suitable space for sessions, and support with timetabling and safeguarding routes. The team will ask for help sharing approved information with families.

for_parents:
  heading: "Information for parents and carers"
  subheading: "Clear information, voluntary participation and careful data protection."
  intro: |
    MyPhone/MyBrain asks important questions about young people's digital lives and brain development. We know these topics can feel sensitive. The project has been designed to give families clear information, meaningful choice and strong safeguards before any child takes part.

    Your child will only take part if the correct consent is in place and they also agree on the day. They can take part in some parts and not others. They can stop at any time. Choosing not to take part will not affect their education, relationship with school or access to any services.
  what_to_know:
    - "Participation is voluntary."
    - "The MyPhone data donation element is optional."
    - "EEG is safe, non-invasive and painless."
    - "The study is not a medical test."
    - "The study does not read thoughts."
    - "The study does not diagnose mental health, ADHD or any other condition."
    - "Findings are reported at group level."
    - "Data are stored and analysed in secure systems."
    - "Raw social media data are handled through the Smart Data Donation Service and are not published openly."
    - "No commercial third party receives pupil data from the project."
    - "Families can contact the research team with questions at any time."
  consent_note: "Participant information sheets, consent forms and privacy information will be shared with schools when finalised. Materials will be accessible, and multilingual and easy-read versions will be made available where possible."

for_young_people:
  heading: "Information for young people"
  subheading: "You are not being tested. You are helping us do better science."
  intro: |
    MyPhone/MyBrain is a research project about digital lives, brains and growing up. We want to understand how different young people use digital technology and how those experiences fit with learning, attention, wellbeing and brain development.

    Taking part is your choice. We will explain what the study involves before asking whether you want to join in. You can say no. You can ask questions. You can choose not to donate phone data. You can stop at any time.
  myphone_heading: "The MyPhone part"
  myphone_items:
    - "You will learn about digital data and how platforms store information about your activity."
    - "You may be able to view summaries of your own data from platforms such as TikTok or YouTube."
    - "You can decide whether to donate data for research."
    - "You may be asked to complete short surveys about digital habits, wellbeing and technology."
    - "You do not have to share anything you are not comfortable sharing."
  mybrain_heading: "The MyBrain part"
  mybrain_items:
    - "You will take part in a science workshop at school."
    - "You may wear an EEG headset that records brain activity from the surface of your head."
    - "You may sit quietly for a short time and complete simple computer tasks."
    - "Researchers will help you with the equipment."
    - "EEG does not hurt, does not put anything into your brain and cannot read your thoughts."
  data_promise_heading: "Our promise to you"
  data_promise:
    - "We will explain what we are asking for."
    - "We will only use data for approved research."
    - "We will protect your privacy."
    - "We will not use the study to judge you."
    - "We will not give your individual data to your teachers, classmates or social media companies."
    - "We will share what we learn in a way that is fair and respectful."

coproduction:
  heading: "Designed with young people, families and schools"
  body: |
    MyPhone/MyBrain has been shaped through piloting and co-production with teenagers, teachers and parents. Young people have helped the team think about what feels acceptable, meaningful and clear. Parent representatives have advised on consent, feasibility and communication. Teachers and school leaders help make sure the research works in real classrooms.

    This matters because the project deals with sensitive topics, including social media data, brain recordings and wellbeing. Public communication will be guided by young people, parent representatives and school partners so that findings are useful, careful and not sensationalised.

inclusion:
  heading: "Designed to be inclusive"
  body: |
    The project team has piloted MyBrain workshops in school settings and adapted procedures to support a wide range of pupils. This includes considering different hair types, religious head coverings, privacy needs and comfort during headset fitting. Where high-quality EEG data cannot be collected, pupils should still be able to take part in the learning experience.

legacy:
  heading: "What the project will create"
  body: |
    MyPhone/MyBrain will create a carefully governed research resource linking digital engagement, brain activity and real-world developmental outcomes. De-identified outputs, analysis tools and research summaries will be shared as openly as possible and as securely as necessary. The long-term aim is to support better evidence for educators, families, policymakers and researchers.
