- name: "Ms Zarina Mirza"
  role: "Co-Investigator"
  affiliation: "Born in Bradford"
  focus: "Large-scale school studies"
  bio: "Zarina Mirza leads school-based research delivery at Born in Bradford, one of the world's largest birth cohort studies. She brings extensive experience in working with schools, families and communities in Bradford to design and deliver inclusive research programmes."

- name: "Dr Amy Bland"
  role: "Co-Investigator"
  affiliation: "University of Leeds"
  focus: "Developmental and social neuroscience"
  bio: "Amy Bland's research focuses on the computational and neural mechanisms underlying how people learn from and respond to social and affective information. She contributes expertise in developmental neuroscience and EEG methodology."

- name: "Dr Emmanuele Tidoni"
  role: "Co-Investigator"
  affiliation: "University of Leeds"
  focus: "Social neuroscience and EEG"
  bio: "Emmanuele Tidoni investigates the social brain — how we perceive and respond to other people's actions, bodies and intentions. He contributes expertise in EEG recording, social neuroscience and experimental design in school-based settings."

- name: "Professor Mahnaz Arvaneh"
  role: "Co-Investigator"
  affiliation: "University of Sheffield"
  focus: "Machine learning and EEG"
  bio: "Mahnaz Arvaneh leads research in machine learning for biosignal processing, with a particular focus on brain-computer interfaces and EEG signal analysis. She contributes expertise in the computational methods used to build normative brain models from large-scale EEG data."

- name: "Dr David Zendle"
  role: "Co-Investigator"
  affiliation: "University of York"
  focus: "Digital data donation"
  bio: "David Zendle is a leading researcher on digital data donation methodology and the analysis of platform engagement data. He contributes expertise in the Smart Data Donation Service and the derivation of digital phenotypes from real-world platform data."

- name: "Professor Mark Mon-Williams"
  role: "Co-Investigator"
  affiliation: "University of Leeds"
  focus: "Education, Connected Bradford and CAER"
  bio: "Mark Mon-Williams leads the Centre for Applied Education Research (CAER) and is a driving force behind Connected Bradford. He brings expertise in population-scale education research, school–university partnerships and the governance frameworks needed to link research data with education and health records."
