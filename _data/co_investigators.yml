- name: "Ms Zarina Mirza"
  role: "Co-Investigator"
  affiliation: "Born in Bradford"
  focus: "Large-scale school studies"
  image: "zarina_mirza.jpg"
  url: "#"
  bio: "Zarina Mirza leads school-based research delivery at Born in Bradford, one of the world's largest birth cohort studies. She brings extensive experience in working with schools, families and communities in Bradford to design and deliver inclusive research programmes."

- name: "Dr Amy Bland"
  role: "Co-Investigator"
  affiliation: "University of Leeds"
  focus: "Developmental and social neuroscience"
  image: "amy_bland.jpg"
  url: "#"
  bio: "Amy Bland's research focuses on how the brain learns from and responds to other people — including how emotional and social experiences shape behaviour and brain activity. She contributes expertise in developmental neuroscience and EEG methodology."

- name: "Dr Emmanuele Tidoni"
  role: "Co-Investigator"
  affiliation: "University of Leeds"
  focus: "Social neuroscience and EEG"
  image: "emmanuele_tidoni.jpg"
  url: "#"
  bio: "Emmanuele Tidoni investigates the social brain — how we perceive and respond to other people's actions, bodies and intentions. He contributes expertise in EEG recording, social neuroscience and experimental design in school-based settings."

- name: "Professor Mahnaz Arvaneh"
  role: "Co-Investigator"
  affiliation: "University of Sheffield"
  focus: "Machine learning and EEG"
  image: "mahnaz_arvaneh.jpg"
  url: "#"
  bio: "Mahnaz Arvaneh leads research in using machine learning to make sense of signals recorded from the brain and body. She contributes expertise in the methods used to build reference pictures of brain activity across large groups of people."

- name: "Dr David Zendle"
  role: "Co-Investigator"
  affiliation: "University of York"
  focus: "Digital data donation"
  image: "david_zendle.jpg"
  url: "#"
  bio: "David Zendle is a leading researcher on digital data donation and the analysis of platform engagement data. He contributes expertise in the Smart Data Donation Service and in drawing meaningful patterns from real-world data about how people use digital platforms."

- name: "Professor Mark Mon-Williams"
  role: "Co-Investigator"
  affiliation: "University of Leeds"
  focus: "Education, Connected Bradford and CAER"
  image: "mark_mon_williams.jpg"
  url: "#"
  bio: "Mark Mon-Williams leads the Centre for Applied Education Research (CAER) and is a driving force behind Connected Bradford. He brings expertise in population-scale education research, school–university partnerships and the oversight frameworks needed to link research data with education and health records."

- name: "Dr John Pickavance"
  role: "Collaborator"
  affiliation: "Bradford Teaching Hospitals NHS Foundation Trust"
  focus: "Clinical partnership and NHS delivery"
  image: "john_pickavance.jpg"
  url: "#"
  bio: "John Pickavance brings clinical and NHS leadership expertise to the project, supporting the partnership between the research programme and Bradford Teaching Hospitals NHS Foundation Trust."

- name: "Dr Megan Wood"
  role: "Collaborator"
  affiliation: "Bradford Teaching Hospitals NHS Foundation Trust"
  focus: "Clinical partnership and NHS delivery"
  image: "megan_wood.jpg"
  url: "#"
  bio: "Megan Wood contributes clinical expertise and NHS partnership knowledge, supporting the connection between MyPhone/MyBrain and Bradford Teaching Hospitals NHS Foundation Trust."
