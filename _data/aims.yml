what_we_learn:
  heading: "What we want to learn"
  items:
    - number: "1"
      heading: "How do different digital engagement patterns vary across young people?"
      body: "We will use donated platform data, self-reflections and brief surveys to identify patterns of digital engagement, including timing, interaction style and types of content. These patterns are sometimes called digital phenotypes."
    - number: "2"
      heading: "How does brain activity vary during adolescence?"
      body: "MyBrain sessions will collect resting and task-based EEG data in schools, helping build developmental brain charts and allowing us to study attention, self-regulation and reward processing."
    - number: "3"
      heading: "How do digital engagement, brain function and real-life outcomes connect?"
      body: "With appropriate permissions, the project will link research data with education and health records through trusted research systems, including Connected Bradford, helping us examine learning, wellbeing and attentional patterns."
    - number: "4"
      heading: "How can evidence be shared responsibly?"
      body: "Findings will be shared with schools, families, young people, policymakers and researchers in ways that are open, careful and contextualised. The project will not be used to diagnose, screen or label individual pupils."

aims:
  heading: "Research aims"
  items:
    - number: "Aim 1"
      body: "Deliver a school-based citizen science programme linking smartphone data donation, brain recordings and contextual records."
    - number: "Aim 2"
      body: "Identify data-driven digital phenotypes that describe different patterns of digital engagement across young people."
    - number: "Aim 3"
      body: "Build normative models of adolescent brain function using resting and task-related EEG data collected in schools."
    - number: "Aim 4"
      body: "Examine how digital engagement, brain function, education, attention, mental health and wellbeing are related over time."
