what_we_learn:
  heading: "What we want to learn"
  items:
    - number: "1"
      heading: "How do different digital engagement patterns vary across young people?"
      body: "We will use donated platform data, self-reflections and brief surveys to map out patterns of digital engagement — including when, how and what young people engage with online."
    - number: "2"
      heading: "How does brain activity vary during adolescence?"
      body: "MyBrain sessions will collect brain recordings in schools — during rest and while completing short tasks — helping build a reference picture of how adolescent brain activity develops and allowing us to study attention, self-control and how the brain responds to rewards."
    - number: "3"
      heading: "How do digital engagement, brain function and real-life outcomes connect?"
      body: "With appropriate permissions, the project will link research data with education and health records through trusted research systems, including Connected Bradford, helping us examine learning, wellbeing and attention over time."
    - number: "4"
      heading: "How can evidence be shared responsibly?"
      body: "Findings will be shared with schools, families, young people, policymakers and researchers in ways that are open, careful and grounded in context. The project will not be used to diagnose, screen or label individual pupils."

aims:
  heading: "Research aims"
  items:
    - number: "Aim 1"
      body: "Deliver a school-based citizen science programme linking smartphone data donation, brain recordings and contextual records."
    - number: "Aim 2"
      body: "Identify the different patterns in how young people engage with digital technology — including timing, style and content — across the study group."
    - number: "Aim 3"
      body: "Build a reference picture of how adolescent brain activity varies across different ages and backgrounds, using brain recordings collected in schools."
    - number: "Aim 4"
      body: "Examine how digital engagement, brain function, education, attention, mental health and wellbeing are related over time."
