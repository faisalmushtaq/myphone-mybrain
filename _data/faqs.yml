- question: "Who is the project for?"
  answer: |
    The website is intended for schools, teachers, parents, carers and young people who have been invited to take part or who want to understand what the project involves.

- question: "What will pupils be asked to do?"
  answer: |
    The study is designed around school-based research sessions. Activities may include age-appropriate cognitive tasks, wellbeing or behaviour questionnaires, EEG recording and optional smartphone data donation. The research team will provide full information before any pupil takes part.

- question: "What is EEG?"
  answer: |
    EEG is a safe, non-invasive way of recording electrical activity from the scalp using small sensors. It does not read thoughts and does not put electricity into the brain.

- question: "Will pupils have to share phone data?"
  answer: |
    Smartphone data donation is optional and will only take place with the appropriate consent and information. The study is designed to avoid collecting unnecessary personal information.

- question: "How can a school express interest?"
  answer: |
    Teachers or school leaders can use the sign-up form on this website. The form creates a pre-filled email to the research team and should only include school-level contact details.

- question: "Who funds the project?"
  answer: |
    MyPhone/MyBrain is funded by the Huo Family Foundation and led by the University of Leeds.
