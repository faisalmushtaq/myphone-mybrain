- name: "Dr Olivia Jones"
  role: "Researcher"
  bio: |
    Olivia contributes to research on cognitive development and EEG methods across diverse populations, supporting the school-based data collection programme.
  image: "https://faisalmushtaq.github.io/brainpop-lab-website/assets/images/people/olivia_jones.jpg"
  links: []

- name: "Dr Jasper van den Bosch"
  role: "Postdoctoral Researcher"
  bio: |
    Jasper specialises in EEG signal processing and reproducibility, building the open-science data infrastructure that underpins the project's large-scale analyses.
  image: "https://faisalmushtaq.github.io/brainpop-lab-website/assets/images/people/jasper_van_den_bosch.jpg"
  links:
    - label: "Google Scholar"
      url: "https://scholar.google.com/citations?user=XQ3-JHgAAAAJ"

- name: "Dr Dominik Welke"
  role: "Postdoctoral Researcher"
  bio: |
    Dominik develops robust, scalable methods for multi-site neuroimaging studies, contributing to the computational and data-science foundations of the project.
  image: "https://faisalmushtaq.github.io/brainpop-lab-website/assets/images/people/dominik_welke.jpg"
  links:
    - label: "Google Scholar"
      url: "https://scholar.google.com/citations?user=B5xCyM0AAAAJ"

- name: "Dr Layla Kouara"
  role: "Research Software Engineer"
  bio: |
    Layla develops and maintains the open-source software tools for EEG data processing and analysis that support reproducible, large-scale research across the project.
  image: "https://faisalmushtaq.github.io/brainpop-lab-website/assets/images/people/layla_kouara.jpg"
  links: []

- name: "Kate Hiley"
  role: "PhD Researcher"
  bio: |
    Kate uses school-based and community EEG to improve the accessibility and inclusivity of neuroscience research with young people.
  image: "https://faisalmushtaq.github.io/brainpop-lab-website/assets/images/people/kate_hiley.jpg"
  links:
    - label: "ORCiD"
      url: "https://orcid.org/0009-0000-1824-3850"

- name: "Miftah Faizah"
  role: "PhD Researcher"
  bio: |
    Miftah studies adolescent mental health using EEG, focusing on neural markers of mental health symptoms and the relationship between brain activity and social media use.
  image: "https://faisalmushtaq.github.io/brainpop-lab-website/assets/images/people/miftah_faizah.jpg"
  links:
    - label: "Webpage"
