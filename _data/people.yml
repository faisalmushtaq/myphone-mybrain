      url: "https://medicinehealth.leeds.ac.uk/psychology/staff/632/professor-faisal-mushtaq"
    - label: "Google Scholar"
      url: "https://scholar.google.com/citations?user=bcjpWSwAAAAJ&hl=en"

- name: "Dr Sarmad Ali"
  role: "Project Manager"
  bio: |
    Sarmad manages project operations, timelines and partnerships, bringing extensive experience in coordinating complex multi-site research programmes.
  image: "https://faisalmushtaq.github.io/brainpop-lab-website/assets/images/people/sarmad_ali.png"
  links:
