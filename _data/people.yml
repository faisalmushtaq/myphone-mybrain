- name: "Professor Faisal Mushtaq"
  role: "Principal Investigator"
  bio: |
    Faisal leads MyPhone/MyBrain. His research focuses on scalable, open approaches to brain-data science, linking large-scale experimental studies with population health data.
  image: "https://faisalmushtaq.github.io/brainpop-lab-website/assets/images/people/faisal_mushtaq.jpg"
  links:
