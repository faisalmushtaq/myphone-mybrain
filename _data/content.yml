why_it_matters: |
  Public debate about smartphones and young people's mental health often moves faster than the evidence. Many studies rely on self-report questionnaires, cross-sectional snapshots, or broad measures of screen time. **MyPhone/MyBrain** takes a more detailed approach — combining direct measures of brain function, behaviour, wellbeing and digital activity within a school-friendly research design.

  We want to understand whether different patterns of digital engagement are linked with adolescent brain development, whether these associations vary across young people and contexts, and how schools and families can be better supported with clearer, more actionable evidence.

  Young people spend more time on digital devices than any previous generation. They deserve research that takes their actual lives seriously — not just averages and headlines.

process_intro: |
  Research sessions are delivered in school, by trained University of Leeds researchers. We work around school timetables and always agree arrangements with senior staff in advance. Participation is voluntary, fully consented, and designed to be a positive experience for pupils.

signup:
  title: "Register your school's interest"
  intro: |
    Teachers and school leaders can use this form to reach the research team. The form creates a pre-filled email so that no pupil information is collected through the website. We will get back to you to discuss what involvement might look like for your school — there is no obligation to proceed.
  email: "myphone-mybrain@leeds.ac.uk"
  privacy_note: "Please do not include pupil names or individual pupil information at this stage. The research team will provide the appropriate participant information sheets, parental consent materials and full data-protection information before any school joins the study."

contact: |
  For enquiries about the project, school participation, or parent and carer information, please contact the MyPhone/MyBrain team. We aim to respond to all messages within five working days.

  The project is based in the **School of Psychology**, Faculty of Medicine and Health, University of Leeds, United Kingdom.

funding_acknowledgement: |
  MyPhone/MyBrain is funded by the **Huo Family Foundation** and led by the University of Leeds in collaboration with participating schools and community partners.
