about: |
  **MyPhone/MyBrain** is a city-scale citizen-science programme examining how patterns of digital engagement relate to adolescent brain development, behaviour and mental health. The project runs two paired school-based workshops across schools in **Bradford and Leeds**:

  **MyPhone** — young people can securely donate a snapshot of their social media usage data, providing insights into usage timing, interaction style and content exposure. These data are used to derive data-driven "digital phenotypes" that characterise different patterns of digital behaviour.

  **MyBrain** — students take part in EEG brain-recording sessions during rest and while completing short cognitive tests, giving a direct window into how brain activity varies across individuals and develops over time.

  Over the next three years we will run these workshops across schools in Bradford and Leeds to build a large linked dataset. We will then connect these data to routinely collected health and education records through the **Connected Bradford** data platform, allowing us to examine how digital behaviour relates to outcomes including academic attainment, mental health and health service use.

  The project is led by Professor Faisal Mushtaq at the University of Leeds and is funded by the **Huo Family Foundation**.

