why_it_matters: |
  Debate about the effects of smartphones and social media on young people has become highly polarised. Digital technologies are deeply embedded in young people's lives, and their effects likely depend on patterns of use, individual differences and social context — not simply how much time someone spends on a screen.

  Understanding these relationships requires large and diverse samples, real-world measures of digital behaviour, and evidence about outcomes that genuinely matter. **MyPhone/MyBrain** addresses that need directly by creating one of the first large-scale resources linking real-world smartphone behaviour with direct measures of adolescent brain function, behaviour and wellbeing.

  By working with schools in Bradford and Leeds — two of the UK's most diverse and dynamic cities — we aim to produce findings that reflect the real breadth of young people's lives, and that can inform education, health and family decision-making for years to come.

process_intro: |
  We use an accelerated longitudinal design, recruiting adolescents from different school years while following a subset longitudinally as they move through secondary school. This lets us model developmental trajectories and examine how patterns of digital engagement relate to change over time.

  Research is delivered through two paired workshops, run by trained University of Leeds researchers in participating schools in **Bradford and Leeds**. Everything is voluntary, fully consented, and designed to be an interesting, age-appropriate experience.

steps:
  - number: "01"
    title: "School conversation"
    body: "We meet with teachers and senior leaders to discuss practical arrangements, timings, year groups, safeguarding routes and what schools need to know before deciding whether to take part. We are currently recruiting schools in Bradford and Leeds only."

  - number: "02"
    title: "Information and consent"
    body: "Parents, carers and pupils receive clear study information well before any activity begins. Both parental permission and the young person's own agreement are needed. Pupils can choose which parts they are comfortable with."

  - number: "03"
    title: "MyPhone workshop"
    body: "Young people can securely donate a snapshot of their social media usage data — covering timing, interaction patterns and content exposure. Full control stays with the participant throughout. These data form the basis of individual digital phenotypes."

  - number: "04"
    title: "MyBrain workshop"
    body: "Students take part in a school-based EEG brain-recording session during rest and while completing short cognitive tasks. Trained researchers handle all equipment. EEG is safe, non-invasive and entirely painless."

signup:
  title: "Register your school's interest"
  intro: |
    Teachers and school leaders at schools in **Bradford and Leeds** can use this form to contact the research team. The form creates a pre-filled email so that no pupil information is collected through the website. We will get back to you to discuss what involvement might look like for your school — there is no obligation to proceed.
  email: "myphone-mybrain@leeds.ac.uk"
  privacy_note: "Please do not include pupil names or individual pupil information at this stage. The research team will provide the appropriate participant information sheets, parental consent materials and full data-protection information before any school joins the study."

contact: |
  For enquiries about the project, school participation, or parent and carer information, please contact the MyPhone/MyBrain team. We aim to respond to all messages within five working days.

  The project is based in the **School of Psychology**, Faculty of Medicine and Health, University of Leeds. We are currently working with schools in **Bradford and Leeds only**.

funding_acknowledgement: |
  MyPhone/MyBrain is funded by the **Huo Family Foundation** and led by the University of Leeds in collaboration with participating schools, the Born in Bradford programme and community partners.
