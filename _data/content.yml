about:
  heading: "A city-scale citizen science programme"
  subheading: "Coordinated through the Centre for Applied Education Research, Bradford"
  body: |
    **MyPhone/MyBrain** is a four-year research programme funded by the Huo Family Foundation and coordinated through the **Centre for Applied Education Research** (CAER), with the research team based at the **Wolfson Centre for Applied Health Research**, Bradford Royal Infirmary. We are partnering with secondary schools in Bradford to run a school-based research session with two parts — together building one of the first large-scale resources linking real-world digital behaviour with direct measures of adolescent brain function, wellbeing and learning.

    **MyPhone** — young people can securely donate a snapshot of their social media usage data through the Smart Data Donation Service. These data capture timing, interaction patterns and content exposure, building up a picture of how each person engages online.

    **MyBrain** — students take part in EEG brain-recording sessions at school, at rest and while completing short cognitive tasks. Trained researchers bring all equipment and run every session. EEG is safe, painless and non-invasive.

    The project recruits pupils from multiple year groups and follows some of them over several years — so we can study both how young people differ from one another and how things change as they grow up. With appropriate consent and the necessary approvals, project data will be linked to health and education records through **Connected Bradford**, enabling us to examine how digital behaviour relates to academic attainment, mental health and wellbeing over time.

    The project is led by **Professor Faisal Mushtaq** (University of Leeds), working with co-investigators spanning developmental neuroscience, machine learning, digital data science, education and population research.

why:
  heading: "Why does this matter?"
  body: |
    Debate about smartphones, social media and young people's wellbeing has become highly polarised — often generating more heat than light. Digital technologies are deeply woven into young people's lives, and any effects are likely to depend on patterns of use, individual differences and social context, not simply how much screen time someone has.

    Progress requires large and diverse samples, real-world measures of digital behaviour, and evidence about outcomes that genuinely matter to families, schools and policymakers. **MyPhone/MyBrain** addresses that need by working in Bradford — one of the UK's youngest and most diverse cities — coordinated through the **Centre for Applied Education Research** and delivered in partnership with Born in Bradford and Connected Bradford.

    The goal is not to alarm or reassure, but to understand. Findings will be shared openly, carefully and in ways that can meaningfully inform education, health and family decision-making for years to come.

process_intro: |
  We recruit pupils from across different school years and follow a group of them over time as they move through secondary school. This means we can track how things change with age and understand both individual differences and longer-term patterns of development. Research is delivered in a single school session — with two parts — run by trained researchers. Everything is voluntary, fully consented and designed to be a genuinely interesting, age-appropriate experience.

steps:
  - number: "01"
    title: "School conversation"
    body: "We meet with teachers and senior leaders to discuss practical arrangements, timings, year groups, safeguarding routes and what schools need before deciding whether to take part. We are recruiting secondary schools in Bradford."

  - number: "02"
    title: "Information and consent"
    body: "Parents, carers and pupils receive clear study information well before any activity begins. Both parental permission and the young person's own agreement are needed. Pupils can choose which parts they take part in."

  - number: "03"
    title: "The research session"
    body: "The session has two parts. In the MyPhone part, young people can securely donate a snapshot of social media usage data — covering timing, interaction patterns and content exposure. In the MyBrain part, pupils wear an EEG cap and complete short cognitive tasks. Trained researchers bring all equipment and support pupils throughout. Both parts are voluntary, and pupils can choose which they take part in."

  - number: "04"
    title: "Linked records and follow-up"
    body: "With appropriate consent and the necessary approvals, data with personal identifiers removed will be linked to education and health records through Connected Bradford. Some pupils will be invited to take part again in later years. Group-level findings will be shared with schools."

signup:
  title: "Register your school's interest"
  intro: |
    Teachers and senior leaders at secondary schools in **Bradford** can use this form to contact the research team. The form creates a pre-filled email so that no pupil information is collected through the website. We will get back to you to discuss what involvement might look like for your school — there is no obligation to proceed.
  email: "brainpop@leeds.ac.uk"
  privacy_note: "Please do not include pupil names or individual pupil information at this stage. The research team will provide participant information sheets, parental consent materials and full data-protection information before any school joins the study."

contact:
  heading: "Get in touch"
  body: |
    For enquiries about the project, school participation, or information for parents and carers, please contact the MyPhone/MyBrain team. We aim to respond within five working days.

    The research team is based at the **Wolfson Centre for Applied Health Research**, Bradford Royal Infirmary, Bradford. The programme is coordinated through the **Centre for Applied Education Research** (CAER).

funding_acknowledgement: |
  MyPhone/MyBrain is funded by the **Huo Family Foundation** and delivered in partnership with the **Born in Bradford** programme, **Connected Bradford** and participating schools across Bradford.
