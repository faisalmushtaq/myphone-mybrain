about: |
  **MyPhone/MyBrain** is a University of Leeds research project exploring how adolescents' digital lives relate to brain development, mental health, behaviour and learning. The project brings together school-based EEG brain recording, carefully designed cognitive and behavioural tasks, wellbeing questionnaires, and optional smartphone data donation to build a richer, more detailed picture of young people's everyday digital experiences.

  The study is designed for schools and young people. Our aim is not to blame phones, screens or social media — it is to understand when, how, and for whom different patterns of digital technology use may matter. By working directly with schools, teachers, parents and pupils, we want to produce evidence that is genuinely useful for education, health, and family decision-making.

  The project is led by Professor Faisal Mushtaq at the University of Leeds and is funded by the **Huo Family Foundation**.

