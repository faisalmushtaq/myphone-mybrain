<section id="participation" class="section section-dark">
  <div class="container">
    <div class="reveal section-heading">
      <p class="section-kicker light">Taking part</p>
      <h2>Two workshops. One city. Real science.</h2>
      <div class="prose prose-light">
        {{ site.data.content.process_intro | markdownify }}
      </div>
    </div>
    <div class="step-grid">
      {% for step in site.data.content.steps %}
      <article class="step-card reveal">
        <span>{{ step.number }}</span>
        <h3>{{ step.title }}</h3>
        <p>{{ step.body }}</p>
      </article>
      {% endfor %}
    </div>
  </div>
</section>
