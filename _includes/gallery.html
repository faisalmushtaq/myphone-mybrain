<section id="gallery" class="section section-light">
  <div class="container">
    <div class="reveal section-heading">
      <p class="section-kicker">From the sessions</p>
      <h2>What it actually looks like</h2>
      <p class="section-subheading">Real sessions from our pilot work in schools.</p>
    </div>

    <div class="video-wrapper reveal">
      <video
        src="{{ '/assets/video/sessions.mp4' | relative_url }}"
        poster="{{ '/assets/images/session-classroom.jpg' | relative_url }}"
        controls
        preload="none"
        aria-label="Video showing MyPhone/MyBrain sessions in schools">
      </video>
    </div>

    <div class="photo-grid reveal">
      <figure class="photo-item photo-item--wide">
        <img src="{{ '/assets/images/session-classroom.jpg' | relative_url }}"
             alt="A researcher presenting to a classroom full of students on laptops during a MyBrain session"
             loading="lazy">
      </figure>
      <figure class="photo-item">
        <img src="{{ '/assets/images/session-brainwaves.jpg' | relative_url }}"
             alt="A student wearing an EEG headset while a researcher points to live brain wave data on a display screen"
             loading="lazy">
      </figure>
      <figure class="photo-item">
        <img src="{{ '/assets/images/session-eeg-fitting.jpg' | relative_url }}"
             alt="A researcher carefully fitting an EEG headset onto a smiling student"
             loading="lazy">
      </figure>
      <figure class="photo-item">
        <img src="{{ '/assets/images/session-eeg-setup.jpg' | relative_url }}"
             alt="A student examining the EEG headset equipment at a school desk with a laptop"
             loading="lazy">
      </figure>
      <figure class="photo-item">
        <img src="{{ '/assets/images/session-eeg-fun.jpg' | relative_url }}"
             alt="Students and a researcher laughing together while trying on the EEG headset"
             loading="lazy">
      </figure>
    </div>
  </div>
</section>
