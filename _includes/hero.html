<section id="hero" class="hero">

  <div class="container hero-content">
    <h1>{{ site.data.content.hero.headline_main }}<span class="slash">/</span><span class="accent">{{ site.data.content.hero.headline_accent }}</span></h1>

    <p class="tagline">{{ site.data.content.hero.tagline }}</p>

    <div class="hero-actions">
      <a href="{{ site.data.content.hero.cta_primary.href }}" class="btn btn-primary">{{ site.data.content.hero.cta_primary.label }} &nbsp;&rarr;</a>
      <a href="{{ site.data.content.hero.cta_secondary.href }}" class="btn btn-ghost">{{ site.data.content.hero.cta_secondary.label }}</a>
      <a href="{{ site.data.content.hero.cta_tertiary.href }}" class="btn btn-ghost">{{ site.data.content.hero.cta_tertiary.label }}</a>
    </div>
  </div>

  <a href="#about" class="hero-scroll" aria-label="Scroll to about section">
    <span class="hero-scroll-line"></span>
    <span>scroll</span>
  </a>
</section>
