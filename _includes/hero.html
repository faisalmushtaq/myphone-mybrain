<section id="hero" class="hero">
  <div class="hero-bg" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <div class="container hero-content">
    <a href="#about" class="hero-badge">
      <span class="badge-dot"></span>
      {{ site.data.content.hero.badge }}
    </a>

    <h1>MyPhone<span class="slash">/</span><span class="accent">MyBrain</span></h1>

    <p class="tagline">{{ site.tagline }}</p>

    <div class="hero-actions">
      <a href="#signup" class="btn btn-primary">{{ site.data.content.hero.cta_primary }} &nbsp;&rarr;</a>
      <a href="#participation" class="btn btn-ghost">{{ site.data.content.hero.cta_secondary }}</a>
    </div>
  </div>

  <a href="#about" class="hero-scroll" aria-label="Scroll to about section">
    <span class="hero-scroll-line"></span>
    <span>scroll</span>
  </a>
</section>
